services:
  opencode:
    build: .
    container_name: opencode
    hostname: opencode
    restart: unless-stopped
    ports:
      - "4096:4096"
      - "5173:5173"
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:?required}
      - OPENCODE_AUTH_B64=${OPENCODE_AUTH_B64:?required}
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - DOKPLOY_URL=${DOKPLOY_URL:-}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY:-}
      # Supermemory integration
      - SUPERMEMORY_API_URL=${SUPERMEMORY_API_URL:-http://supermemory:6767}
      # Kimi K2.7 Coding via OpenAI-compatible endpoint
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.kimi.com/coding/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?required}
      - OPENAI_MODEL=${OPENAI_MODEL:-kimi-k2.7-code}
      - OPENAI_FAST_MODEL=${OPENAI_FAST_MODEL:-${OPENAI_MODEL:-kimi-k2.7-code}}
      - OPENAI_TEXT_MODEL=${OPENAI_TEXT_MODEL:-${OPENAI_MODEL:-kimi-k2.7-code}}
    volumes:
      - projects_dir:/home/developer/Documents
      - ssh:/home/developer/.ssh
      - opencode_data:/home/developer/.local/share/opencode
      - opencode_config:/home/developer/.config/opencode
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4096"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - supermemory

  supermemory:
    image: node:22-slim
    container_name: supermemory
    hostname: supermemory
    restart: unless-stopped
    ports:
      - "6767:6767"
    environment:
      - PORT=6767
      - SUPERMEMORY_DATA_DIR=/data
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.kimi.com/coding/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?required}
      - OPENAI_MODEL=${OPENAI_MODEL:-kimi-k2.7-code}
      - OPENAI_FAST_MODEL=${OPENAI_FAST_MODEL:-${OPENAI_MODEL:-kimi-k2.7-code}}
      - OPENAI_TEXT_MODEL=${OPENAI_TEXT_MODEL:-${OPENAI_MODEL:-kimi-k2.7-code}}
    volumes:
      - supermemory_data:/data
    working_dir: /data
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends curl ca-certificates &&
             curl -fsSL https://supermemory.ai/install | bash &&
             export PATH=\"$$HOME/.supermemory:$$PATH\" &&
             exec supermemory-server"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "6767"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  projects_dir:
  ssh:
  opencode_data:
  opencode_config:
  supermemory_data:
